<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xiaowu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="site">
    <section class="hero">
      <div class="hero-inner">
        <div class="profile-head">
          <img class="avatar" src="https://github.com/jxiaow.png" alt="Xiaowu" />
          <h1>Xiaowu</h1>
        </div>
        <p class="subtitle">利用 AI 做一些真实可用的工具和项目。</p>
        <div class="line"></div>
        <p class="intro">
          记录一些正在构建的项目，<br />
          以及折腾过程中的想法与实践。
        </p>
        <div class="links">
          <a href="https://github.com/jxiaow" target="_blank" rel="noreferrer">
            <span class="icon github"></span>
            GitHub
          </a>
          <a href="mailto:jxiaow@126.com">
            <span class="icon mail"></span>
            jxiaow@126.com
          </a>
        </div>
      </div>
    </section>

    <section class="work">
      <div class="work-inner">
        <header class="section-title">
          <div class="code-mark">&lt;/&gt;</div>
          <div>
            <h2>项目</h2>
            <p>正在构建中的工具与实践</p>
          </div>
        </header>

        <div class="cards">
          <article class="card">
            <div class="card-top">
              <div class="app-icon robot"></div>
              <div>
                <h3>Agent Harness</h3>
                <span class="pill blue">AI · Workflow · DevOps</span>
              </div>
            </div>
            <p class="card-desc">
              让 AI 在可控流程下完成开发、修改与验证，<br />
              提升交付效率与稳定性。
            </p>
            <div class="card-footer">
              <a href="https://jxiaow.github.io/agent-harness/" target="_blank" rel="noreferrer">查看项目 →</a>
              <span class="github-small"></span>
            </div>
          </article>

          <article class="card">
            <div class="card-top">
              <div class="app-icon code"></div>
              <div>
                <h3>Forja</h3>
                <span class="pill green">AI · Code Generation · Apps</span>
              </div>
            </div>
            <p class="card-desc">
              探索 AI 代码生成与应用构建的实践，<br />
              专注于快速原型与工程化落地。
            </p>
            <div class="card-footer">
              <a href="https://jxiaow.github.io/Forja/" target="_blank" rel="noreferrer">查看项目 →</a>
              <span class="github-small"></span>
            </div>
          </article>
        </div>

        <footer class="footer">
          <p>© Xiaowu</p>
          <p>把想法变成代码，把代码变成工具。</p>
        </footer>
      </div>
    </section>
  </main>
</body>
</html>
